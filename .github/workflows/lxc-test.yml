name: LXC deploy and test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-lxc
  cancel-in-progress: false

on:
  workflow_call:
    inputs:
      cmlxc_commands:
        description: >-
          Newline-separated cmlxc commands to run after setup.
          The caller repository is checked out into ./repo.
        required: true
        type: string

jobs:
  lxc-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: repo

      - name: Checkout cmlxc
        uses: actions/checkout@v6
        with:
          repository: chatmail/cmlxc
          path: cmlxc

      - name: Install Incus (Zabbly)
        run: |
          sudo mkdir -p /etc/apt/keyrings
          sudo curl -fsSL https://pkgs.zabbly.com/key.asc -o /etc/apt/keyrings/zabbly.asc
          echo "deb [signed-by=/etc/apt/keyrings/zabbly.asc] https://pkgs.zabbly.com/incus/stable $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/zabbly-incus.list
          sudo apt-get update
          sudo apt-get install -y incus

      - name: Initialise Incus
        run: |
          sudo systemctl stop docker.socket docker || true
          sudo iptables -P FORWARD ACCEPT
          sudo sysctl -w fs.inotify.max_user_instances=65535
          sudo sysctl -w fs.inotify.max_user_watches=65535
          sudo incus admin init --auto
          sudo chmod 666 /var/lib/incus/unix.socket

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install cmlxc
        run: |
          python -m pip install --upgrade pip
          pip install -e ./cmlxc

      - name: Cache Incus images
        id: cache-images
        uses: actions/cache@v5
        with:
          path: /tmp/incus-cache
          key: incus-v2-${{ runner.os }}-${{ hashFiles('cmlxc/src/cmlxc/*.py') }}
          restore-keys: |
            incus-v2-${{ runner.os }}-

      - name: Import cached images
        run: |
          mkdir -p /tmp/incus-cache
          for alias in localchat-base localchat-builder localchat-cmdeploy; do
            if [ -f /tmp/incus-cache/$alias.tar.gz ]; then
              echo "Importing: $alias"
              incus image import /tmp/incus-cache/$alias.tar.gz --alias $alias || true
            fi
          done

      - name: Parse cmlxc commands
        id: parse
        shell: bash
        run: |
          i=1
          while IFS= read -r line || [ -n "$line" ]; do
            # Trim leading/trailing whitespace
            trimmed=$(echo "$line" | xargs)
            # Skip empty lines and comments
            [[ -z "$trimmed" || "$trimmed" == "#"* ]] && continue
            echo "cmd${i}=${trimmed}" >> "$GITHUB_OUTPUT"
            i=$((i+1))
          done <<'EOF'
          ${{ inputs.cmlxc_commands }}
          EOF
          echo "count=$((i-1))" >> "$GITHUB_OUTPUT"

      - name: "cmlxc: ${{ steps.parse.outputs.cmd1 }}"
        if: steps.parse.outputs.count >= 1
        run: ${{ steps.parse.outputs.cmd1 }}

      - name: "cmlxc: ${{ steps.parse.outputs.cmd2 }}"
        if: steps.parse.outputs.count >= 2
        run: ${{ steps.parse.outputs.cmd2 }}

      - name: "cmlxc: ${{ steps.parse.outputs.cmd3 }}"
        if: steps.parse.outputs.count >= 3
        run: ${{ steps.parse.outputs.cmd3 }}

      - name: "cmlxc: ${{ steps.parse.outputs.cmd4 }}"
        if: steps.parse.outputs.count >= 4
        run: ${{ steps.parse.outputs.cmd4 }}

      - name: "cmlxc: ${{ steps.parse.outputs.cmd5 }}"
        if: steps.parse.outputs.count >= 5
        run: ${{ steps.parse.outputs.cmd5 }}

      - name: "cmlxc: ${{ steps.parse.outputs.cmd6 }}"
        if: steps.parse.outputs.count >= 6
        run: ${{ steps.parse.outputs.cmd6 }}

      - name: "cmlxc: ${{ steps.parse.outputs.cmd7 }}"
        if: steps.parse.outputs.count >= 7
        run: ${{ steps.parse.outputs.cmd7 }}

      - name: "cmlxc: ${{ steps.parse.outputs.cmd8 }}"
        if: steps.parse.outputs.count >= 8
        run: ${{ steps.parse.outputs.cmd8 }}

      - name: "cmlxc: ${{ steps.parse.outputs.cmd9 }}"
        if: steps.parse.outputs.count >= 9
        run: ${{ steps.parse.outputs.cmd9 }}

      - name: "cmlxc: ${{ steps.parse.outputs.cmd10 }}"
        if: steps.parse.outputs.count >= 10
        run: ${{ steps.parse.outputs.cmd10 }}

      - name: "cmlxc: ${{ steps.parse.outputs.cmd11 }}"
        if: steps.parse.outputs.count >= 11
        run: ${{ steps.parse.outputs.cmd11 }}

      - name: "cmlxc: ${{ steps.parse.outputs.cmd12 }}"
        if: steps.parse.outputs.count >= 12
        run: ${{ steps.parse.outputs.cmd12 }}

      - name: Run remaining cmlxc commands
        if: steps.parse.outputs.count > 12
        env:
          CMLXC_COMMANDS: ${{ inputs.cmlxc_commands }}
        run: |
          set -eu
          i=0
          while IFS= read -r cmd || [ -n "$cmd" ]; do
            trimmed=$(echo "$cmd" | xargs)
            [[ -z "$trimmed" || "$trimmed" == "#"* ]] && continue
            i=$((i+1))
            if [ $i -le 12 ]; then continue; fi

            echo "::group::Run: $trimmed"
            eval "$trimmed" || { echo "::endgroup::"; exit 1; }
            echo "::endgroup::"
          done <<< "$CMLXC_COMMANDS"

      - name: Show container logs on failure
        if: failure()
        run: |
          for c in $(incus list -c n --format csv); do
            echo "::group::Logs for $c"
            incus exec "$c" -- journalctl -p warning --no-pager -n 100 || true
            echo "::endgroup::"
          done

      - name: Export images for cache
        if: always() && steps.cache-images.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/incus-cache
          if incus list -c n --format csv | grep -q builder-localchat; then
            echo "Cleaning up builder container before publishing ..."
            incus exec builder-localchat -- bash -c 'rm -rf /root/relays/* /root/.cache/* /root/.npm /root/.bun'
            echo "Publishing builder container as image ..."
            incus publish builder-localchat --alias localchat-builder --force || true
          fi
          for alias in localchat-base localchat-builder localchat-cmdeploy; do
            if incus image list --format csv -c l | grep -q "^$alias$"; then
              echo "Exporting: $alias"
              incus image export $alias /tmp/incus-cache/$alias || true
              if [ -f /tmp/incus-cache/$alias ] && [ ! -f /tmp/incus-cache/$alias.tar.gz ]; then
                mv /tmp/incus-cache/$alias /tmp/incus-cache/$alias.tar.gz
              fi
            fi
          done
